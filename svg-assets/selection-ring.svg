<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">Selection ring</title>
  <desc id="desc">Pulsing ring for active column or target square.</desc>
  <style>
    .pulse {
      transform-origin: 48px 48px;
      animation: pulse 1200ms ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(0.92); opacity: 0.55; }
      50% { transform: scale(1.06); opacity: 1; }
    }
  </style>
  <g class="pulse" fill="none">
    <circle cx="48" cy="48" r="34" stroke="#71F7D5" stroke-width="4" stroke-opacity="0.85"/>
    <circle cx="48" cy="48" r="26" stroke="#ffffff" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="6 6"/>
  </g>
</svg>