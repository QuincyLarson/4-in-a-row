<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 120" role="img" aria-labelledby="title desc">
  <title id="title">Drop preview chip</title>
  <desc id="desc">Ghost chip with arrow used as the column hover preview.</desc>
  <defs>
    <linearGradient id="ghostGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.14"/>
