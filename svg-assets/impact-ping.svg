<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="title desc">
  <title id="title">Impact ping</title>
  <desc id="desc">Concentric ring impact effect for chip landing.</desc>
  <style>
    .ring1 { animation: ping1 700ms ease-out infinite; transform-origin: 60px 60px; }
    .ring2 { animation: ping2 700ms ease-out infinite; transform-origin: 60px 60px; }
    @keyframes ping1 {
      0% { transform: scale(0.35); opacity: 0.9; }
      100% { transform: scale(1.1); opacity: 0; }
    }
    @keyframes ping2 {
      0% { transform: scale(0.2); opacity: 0; }
      30% { opacity: 0.55; }
      100% { transform: scale(1.35); opacity: 0; }
    }
  </style>
  <circle class="ring1" cx="60" cy="60" r="28" fill="none" stroke="#71F7D5" stroke-width="4"/>
  <circle class="ring2" cx="60" cy="60" r="28" fill="none" stroke="#ffffff" stroke-opacity="0.6" stroke-width="2" stroke-dasharray="5 5"/>
</svg>