<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">CPU disc</title>
  <desc id="desc">Indigo to blue game disc with dot and ring pattern for colorblind-friendly play.</desc>
  <defs>
    <radialGradient id="discGradC" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#8FA8FF"/>
      <stop offset="100%" stop-color="#5E6CFF"/>
    </radialGradient>
    <filter id="dropShadowC" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#050B26" flood-opacity="0.38"/>
    </filter>
  </defs>
  <g filter="url(#dropShadowC)">
    <circle cx="48" cy="48" r="40" fill="url(#discGradC)"/>
    <circle cx="48" cy="48" r="40" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
    <circle cx="48" cy="48" r="29" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2"/>
    <circle cx="48" cy="48" r="7" fill="#ffffff" fill-opacity="0.55"/>
    <circle cx="48" cy="29" r="4" fill="#ffffff" fill-opacity="0.38"/>
    <circle cx="29" cy="48" r="4" fill="#ffffff" fill-opacity="0.32"/>
    <circle cx="67" cy="48" r="4" fill="#ffffff" fill-opacity="0.32"/>
    <circle cx="48" cy="67" r="4" fill="#ffffff" fill-opacity="0.32"/>
    <ellipse cx="37" cy="28" rx="16" ry="9" fill="#ffffff" opacity="0.16" transform="rotate(-18 37 28)"/>
  </g>
</svg>