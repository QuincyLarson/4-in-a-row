<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <linearGradient id="spriteBoardGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1F4A73"/>
      <stop offset="100%" stop-color="#16324F"/>
    </linearGradient>
    <radialGradient id="spriteHumanGrad" cx="35%" cy="30%" r="70%">
