<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 680" role="img" aria-labelledby="title desc">
  <title id="title">Drop Four board frame</title>
  <desc id="desc">Rounded board frame with seven columns and six rows of circular holes. Designed for chips to animate behind it.</desc>
  <defs>
    <linearGradient id="frameGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1F4A73"/>
      <stop offset="100%" stop-color="#16324F"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <mask id="holes">
      <rect width="100%" height="100%" fill="white"/>
      <circle cx="90" cy="110" r="34" fill="black"/><circle cx="190" cy="110" r="34" fill="black"/><circle cx="290" cy="110" r="34" fill="black"/><circle cx="390" cy="110" r="34" fill="black"/><circle cx="490" cy="110" r="34" fill="black"/><circle cx="590" cy="110" r="34" fill="black"/><circle cx="690" cy="110" r="34" fill="black"/><circle cx="90" cy="200" r="34" fill="black"/><circle cx="190" cy="200" r="34" fill="black"/><circle cx="290" cy="200" r="34" fill="black"/><circle cx="390" cy="200" r="34" fill="black"/><circle cx="490" cy="200" r="34" fill="black"/><circle cx="590" cy="200" r="34" fill="black"/><circle cx="690" cy="200" r="34" fill="black"/><circle cx="90" cy="290" r="34" fill="black"/><circle cx="190" cy="290" r="34" fill="black"/><circle cx="290" cy="290" r="34" fill="black"/><circle cx="390" cy="290" r="34" fill="black"/><circle cx="490" cy="290" r="34" fill="black"/><circle cx="590" cy="290" r="34" fill="black"/><circle cx="690" cy="290" r="34" fill="black"/><circle cx="90" cy="380" r="34" fill="black"/><circle cx="190" cy="380" r="34" fill="black"/><circle cx="290" cy="380" r="34" fill="black"/><circle cx="390" cy="380" r="34" fill="black"/><circle cx="490" cy="380" r="34" fill="black"/><circle cx="590" cy="380" r="34" fill="black"/><circle cx="690" cy="380" r="34" fill="black"/><circle cx="90" cy="470" r="34" fill="black"/><circle cx="190" cy="470" r="34" fill="black"/><circle cx="290" cy="470" r="34" fill="black"/><circle cx="390" cy="470" r="34" fill="black"/><circle cx="490" cy="470" r="34" fill="black"/><circle cx="590" cy="470" r="34" fill="black"/><circle cx="690" cy="470" r="34" fill="black"/><circle cx="90" cy="560" r="34" fill="black"/><circle cx="190" cy="560" r="34" fill="black"/><circle cx="290" cy="560" r="34" fill="black"/><circle cx="390" cy="560" r="34" fill="black"/><circle cx="490" cy="560" r="34" fill="black"/><circle cx="590" cy="560" r="34" fill="black"/><circle cx="690" cy="560" r="34" fill="black"/>
    </mask>
    <filter id="boardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#06101A" flood-opacity="0.5"/>
    </filter>
  </defs>
  <g filter="url(#boardShadow)">
    <rect x="20" y="20" width="740" height="640" rx="44" fill="url(#frameGrad)" mask="url(#holes)"/>
    <rect x="20" y="20" width="740" height="640" rx="44" fill="url(#shine)" opacity="0.8"/>
    <rect x="20" y="20" width="740" height="640" rx="44" fill="none" stroke="#7FDBFF" stroke-opacity="0.18" stroke-width="3"/>
  </g>
  <g fill="#09111C" opacity="0.92">
    <circle cx="90" cy="110" r="30"/><circle cx="190" cy="110" r="30"/><circle cx="290" cy="110" r="30"/><circle cx="390" cy="110" r="30"/><circle cx="490" cy="110" r="30"/><circle cx="590" cy="110" r="30"/><circle cx="690" cy="110" r="30"/><circle cx="90" cy="200" r="30"/><circle cx="190" cy="200" r="30"/><circle cx="290" cy="200" r="30"/><circle cx="390" cy="200" r="30"/><circle cx="490" cy="200" r="30"/><circle cx="590" cy="200" r="30"/><circle cx="690" cy="200" r="30"/><circle cx="90" cy="290" r="30"/><circle cx="190" cy="290" r="30"/><circle cx="290" cy="290" r="30"/><circle cx="390" cy="290" r="30"/><circle cx="490" cy="290" r="30"/><circle cx="590" cy="290" r="30"/><circle cx="690" cy="290" r="30"/><circle cx="90" cy="380" r="30"/><circle cx="190" cy="380" r="30"/><circle cx="290" cy="380" r="30"/><circle cx="390" cy="380" r="30"/><circle cx="490" cy="380" r="30"/><circle cx="590" cy="380" r="30"/><circle cx="690" cy="380" r="30"/><circle cx="90" cy="470" r="30"/><circle cx="190" cy="470" r="30"/><circle cx="290" cy="470" r="30"/><circle cx="390" cy="470" r="30"/><circle cx="490" cy="470" r="30"/><circle cx="590" cy="470" r="30"/><circle cx="690" cy="470" r="30"/><circle cx="90" cy="560" r="30"/><circle cx="190" cy="560" r="30"/><circle cx="290" cy="560" r="30"/><circle cx="390" cy="560" r="30"/><circle cx="490" cy="560" r="30"/><circle cx="590" cy="560" r="30"/><circle cx="690" cy="560" r="30"/>
  </g>
  <g fill="none" stroke="#ffffff" stroke-opacity="0.08">
    <circle cx="90" cy="110" r="34"/><circle cx="190" cy="110" r="34"/><circle cx="290" cy="110" r="34"/><circle cx="390" cy="110" r="34"/><circle cx="490" cy="110" r="34"/><circle cx="590" cy="110" r="34"/><circle cx="690" cy="110" r="34"/><circle cx="90" cy="200" r="34"/><circle cx="190" cy="200" r="34"/><circle cx="290" cy="200" r="34"/><circle cx="390" cy="200" r="34"/><circle cx="490" cy="200" r="34"/><circle cx="590" cy="200" r="34"/><circle cx="690" cy="200" r="34"/><circle cx="90" cy="290" r="34"/><circle cx="190" cy="290" r="34"/><circle cx="290" cy="290" r="34"/><circle cx="390" cy="290" r="34"/><circle cx="490" cy="290" r="34"/><circle cx="590" cy="290" r="34"/><circle cx="690" cy="290" r="34"/><circle cx="90" cy="380" r="34"/><circle cx="190" cy="380" r="34"/><circle cx="290" cy="380" r="34"/><circle cx="390" cy="380" r="34"/><circle cx="490" cy="380" r="34"/><circle cx="590" cy="380" r="34"/><circle cx="690" cy="380" r="34"/><circle cx="90" cy="470" r="34"/><circle cx="190" cy="470" r="34"/><circle cx="290" cy="470" r="34"/><circle cx="390" cy="470" r="34"/><circle cx="490" cy="470" r="34"/><circle cx="590" cy="470" r="34"/><circle cx="690" cy="470" r="34"/><circle cx="90" cy="560" r="34"/><circle cx="190" cy="560" r="34"/><circle cx="290" cy="560" r="34"/><circle cx="390" cy="560" r="34"/><circle cx="490" cy="560" r="34"/><circle cx="590" cy="560" r="34"/><circle cx="690" cy="560" r="34"/>
