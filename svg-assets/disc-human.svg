<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">Human disc</title>
  <desc id="desc">Coral to amber game disc with slash pattern for colorblind-friendly play.</desc>
  <defs>
    <radialGradient id="discGradH" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FF8A5B"/>
      <stop offset="100%" stop-color="#FF5D6C"/>
    </radialGradient>
    <filter id="dropShadowH" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#24080F" flood-opacity="0.35"/>
    </filter>
  </defs>
  <g filter="url(#dropShadowH)">
    <circle cx="48" cy="48" r="40" fill="url(#discGradH)"/>
    <circle cx="48" cy="48" r="40" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
    <circle cx="48" cy="48" r="28" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2"/>
    <path d="M28 61 L47 34" stroke="#ffffff" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round"/>
    <path d="M44 66 L63 39" stroke="#ffffff" stroke-opacity="0.45" stroke-width="6" stroke-linecap="round"/>
    <ellipse cx="37" cy="28" rx="16" ry="9" fill="#ffffff" opacity="0.18" transform="rotate(-18 37 28)"/>
  </g>
</svg>